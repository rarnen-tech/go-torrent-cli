services:
  redis:
    image: redis:7-alpine
    container_name: go-torrent-cli-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    container_name: go-torrent-cli-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: torrent_cli
      POSTGRES_USER: torrent
      POSTGRES_PASSWORD: torrent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U torrent -d torrent_cli"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  postgres-data:
