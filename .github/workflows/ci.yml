name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Show Go version
        run: go version

      - name: Run tests
        run: go test ./...

      - name: Run benchmarks
        run: go test -run ^$ -bench Benchmark -benchmem ./internal/torrent

      - name: Build app
        run: go build -trimpath -o bin/go-torrent-cli ./cmd/app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-torrent-cli-${{ runner.os }}
          path: bin/
