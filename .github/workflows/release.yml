name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release files
        shell: bash
        run: |
          set -e
          mkdir -p dist
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/go-torrent-cli-windows-amd64.exe ./cmd/app
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/go-torrent-cli-linux-amd64 ./cmd/app
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/go-torrent-cli-darwin-arm64 ./cmd/app

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
